# FileBrowser Quantum 配置文件
# 官方文档：https://filebrowserquantum.com/en/docs/configuration/configuration-overview/

server:
  # 服务器端口配置
  port: 80                                # 监听端口，默认80
  database: "/aria2/config/filebrowser_quantum.db"  # 数据库文件路径
  cacheDir: "/aria2/config/filebrowser_quantum_cache"         # 缓存目录路径，用于存储缩略图等临时文件
  cacheDirCleanup: true                   # 是否自动清理缓存目录

  # 日志配置
  logging:
    - levels: "warning|error"             # 日志级别：只显示警告和错误，不显示普通操作日志
      apiLevels: "warning|error"                  # API日志级别：只显示错误
      output: "stdout"                    # 输出位置

  # 文件源配置
  sources:
    - path: "/aria2/download"             # 文件系统路径
      name: "Downloads"                   # 显示名称
      config:
        defaultEnabled: true              # 是否作为新用户的默认源

auth:
  # 管理员账号配置
  adminUsername: "admin"                  # 管理员用户名
  adminPassword: "admin"                  # 管理员密码

  # 认证方法配置
  methods:
    password:                             # 密码认证
      enabled: true                       # 启用密码认证

frontend:
  # 前端界面配置
  name: "FileBrowser Quantum"             # 显示名称

userDefaults:
  # 用户默认设置
  locale: "zh-cn"                         # 默认语言设置为中文
